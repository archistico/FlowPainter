name: build

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore FlowPainter.sln

      - name: Build
        run: dotnet build FlowPainter.sln -c Release --no-restore

      - name: Test
        run: dotnet test FlowPainter.sln -c Release --no-build --logger "console;verbosity=normal"
